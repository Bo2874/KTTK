<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản lý Nhà hàng - Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh; padding: 30px 0;">

    <div class="card shadow p-4" style="width: 480px; border-radius: 12px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">HỆ THỐNG NHÀ HÀNG</h3>
            <p class="text-muted">Đăng ký tài khoản khách hàng</p>
        </div>

        <div th:if="${error}" class="alert alert-danger text-center" role="alert" th:text="${error}">
            Lỗi đăng ký
        </div>

        <form th:action="@{/register}" method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Họ và tên</label>
                <input type="text" name="fullName" class="form-control" required maxlength="100"
                       th:value="${fullName}" placeholder="Nhập họ và tên">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Số điện thoại</label>
                <input type="text" name="phone" class="form-control" required pattern="^0\d{9,10}$"
                       th:value="${phone}" placeholder="VD: 0901234567">
                <div class="form-text">Bắt đầu bằng 0, gồm 10-11 chữ số</div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Email</label>
                <input type="email" name="email" class="form-control" required
                       th:value="${email}" placeholder="example@gmail.com">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Tên đăng nhập</label>
                <input type="text" name="username" class="form-control" required minlength="4" maxlength="80"
                       th:value="${username}" placeholder="Tối thiểu 4 ký tự">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Mật khẩu</label>
                <input type="password" name="password" class="form-control" required minlength="6"
                       placeholder="Tối thiểu 6 ký tự">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Xác nhận mật khẩu</label>
                <input type="password" name="confirmPassword" class="form-control" required minlength="6"
                       placeholder="Nhập lại mật khẩu">
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold text-uppercase">Đăng ký</button>
        </form>

        <div class="text-center mt-3">
            <span class="text-muted">Đã có tài khoản?</span>
            <a th:href="@{/login}" class="fw-bold text-decoration-none">Đăng nhập</a>
        </div>
    </div>

</div>
</body>
</html>
