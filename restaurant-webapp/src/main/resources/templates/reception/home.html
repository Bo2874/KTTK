<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lễ Tân - Trang Chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 900px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Trang chủ lễ tân</h2>
        <a href="/logout" class="btn btn-outline-secondary">Đăng xuất</a>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card shadow-sm h-100 border-0">
                <div class="card-body d-flex flex-column">
                    <h4 class="card-title">Duyệt đơn hàng</h4>
                    <p class="card-text text-muted">Xem danh sách đơn chờ xác nhận và thực hiện xác nhận / từ chối đơn đặt bàn của khách hàng.</p>
                    <div class="mt-auto">
                        <a th:href="@{/reception/dashboard}" class="btn btn-primary">Mở danh sách duyệt đơn</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
