<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Khách Hàng - Trang Chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Trang chủ khách hàng</h2>
        <a href="/logout" class="btn btn-outline-secondary">Đăng xuất</a>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-body d-flex flex-column">
                    <h4 class="card-title">Đặt bàn</h4>
                    <p class="card-text text-muted">Bắt đầu quy trình đặt bàn: chọn thời gian, chọn bàn, chọn món và gửi yêu cầu.</p>
                    <div class="mt-auto">
                        <a th:href="@{/booking/time-selection}" class="btn btn-primary">Bắt đầu đặt bàn</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-body d-flex flex-column">
                    <h4 class="card-title">Đơn đặt</h4>
                    <p class="card-text text-muted">Xem lại các phiếu đơn đã đặt và trạng thái xử lý (chờ xác nhận / đã xác nhận).</p>
                    <div class="mt-auto">
                        <a th:href="@{/booking/orders}" class="btn btn-success">Xem đơn đặt</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
