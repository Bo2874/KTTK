# Port khởi chạy (localhost:8080)
server.port=8080

# Cấu hình CSDL (Sử dụng MySQL)
# Hãy tạo một schema trống trước theo tên "restaurant_db" trong MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/restaurant_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=Bo.280704
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Big Bang refactor: tạm thời tắt tự động cập nhật schema để tránh Hibernate tạo lại bảng cũ
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Cấu hình cho Thymeleaf (Không catch cache để Dev mode nóng (hot load) nhanh hơn)
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
