<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản lý Nhà hàng - Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    
    <div class="card shadow p-4" style="width: 400px; border-radius: 12px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">HỆ THỐNG NHÀ HÀNG</h3>
            <p class="text-muted">Đăng nhập</p>
        </div>
        
        <div th:if="${error}" class="alert alert-danger text-center" role="alert" th:text="${error}">
            Sai tài khoản hoặc mật khẩu
        </div>
        
        <form th:action="@{/login}" method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Tên đăng nhập</label>
                <input type="text" name="username" class="form-control" required placeholder="Nhập tên đăng nhập">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Mật khẩu</label>
                <input type="password" name="password" class="form-control" required placeholder="Nhập mật khẩu">
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold text-uppercase">Đăng nhập</button>
        </form>
    </div>
    
</div>
</body>
</html>
