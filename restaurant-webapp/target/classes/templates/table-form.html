<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật bàn</title>
    <!-- Nhúng Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Nhà Hàng KTTK</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/admin/dishes">Quản lý Món ăn</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/admin/tables">Quản lý Bàn</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link text-warning" href="/logout">Đăng xuất</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card p-4 shadow-sm w-50" style="border-radius: 12px;">
        <h3 class="text-center mb-4" th:text="${table.id != null} ? 'Sửa thông tin Bàn' : 'Thêm bộ bàn mới'"></h3>
        
        <!-- Khối thông báo lỗi nếu có -->
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
            <span th:text="${errorMessage}"></span>
        </div>
        
        <!-- Form nhập bàn -->
        <form th:action="@{/admin/tables/save}" th:object="${table}" method="post">
            <input type="hidden" th:field="*{id}">
            
            <div class="mb-3">
                <label class="form-label fw-bold">Mã bàn</label>
                <input type="text" class="form-control" th:field="*{tableCode}" placeholder="Vd: VIP-01, T1-02..." required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Khu vực</label>
                <select class="form-select" th:field="*{area}">
                    <option value="Tầng 1">Tầng 1</option>
                    <option value="Tầng 2">Tầng 2</option>
                    <option value="VIP">Phòng VIP</option>
                    <option value="Ban công">Ban công (Ngoài trời)</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Sức chứa</label>
                <input type="number" class="form-control" th:field="*{capacity}" placeholder="Bàn này chứa được mấy người?" required>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a th:href="@{/admin/tables}" class="btn btn-secondary w-48 text-white text-decoration-none">Quay lại</a>
                <button type="submit" class="btn btn-success w-48">Lưu thông tin</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
